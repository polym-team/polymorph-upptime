status-website:
  baseUrl: /polymorph-upptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Polymorph Status
  introTitle: "**Polymorph** 서비스 상태"
  introMessage: |
    이 페이지는 GitHub Actions로 5분마다 각 서비스를 체크해 자동 갱신됩니다.
    인프라/Cloudflare Tunnel 장애 시에도 GitHub Pages가 살아있는 한 이 페이지는 동작합니다.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

